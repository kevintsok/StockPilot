# Ruff configuration for StockPilot
# See: https://docs.astral.sh/ruff/configuration/

line-length = 100
target-version = "py310"

[lint]
select = [
  "E",      # pycodestyle errors
  "W",      # pycodestyle warnings
  "F",      # Pyflakes
  "I",      # isort
  "N",      # pep8-naming
  "UP",     # pyupgrade
  "B",      # flake8-bugbear
  "C4",     # flake8-comprehensions
  "DTZ",    # flake8-datetimez
  "T10",    # flake8-debugger
  "ISC",    # flake8-implicit-str-concat
  "PIE",    # flake8-pie
  "RET",    # flake8-return
  "SIM",    # flake8-simplify
  "PTH",    # flake8-use-pathlib
  "RUF",    # Ruff-specific rules
]
ignore = [
  "E501",   # line too long (handled by formatter)
  "B008",   # do not perform function calls in argument defaults
  "C901",   # too complex
  "UP007",  # use X | Y for union types (needs py310+ target)
  "RET505", # unnecessary-else-return
]

[lint.per-file-ignores]
"tests/*" = ["B011", "S101", "D", "T20"]
"__init__.py" = ["F401"]

[format]
quote-style = "single"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
